# Picom configuration — One Dark themed

# Backend
backend = "glx";
vsync = true;

# Rounded corners
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'",
    "class_g = 'i3lock'",
];

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;
shadow-color = "#000000";
shadow-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'i3bar'",
    "class_g = 'i3lock'",
    "class_g = 'maim'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@",
];

# Fading
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 8;
no-fading-openclose = false;
fade-exclude = [
    "class_g = 'i3lock'",
];

# Opacity
inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
    "100:class_g = 'i3lock'",
    "100:class_g = 'maim'",
    "100:class_g = 'slop'",
];

# Blur
blur-method = "dual_kawase";
blur-strength = 3;
blur-background-exclude = [
    "class_g = 'i3lock'",
    "class_g = 'maim'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@",
];

# Window type settings
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.95; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; shadow = true; };
};
