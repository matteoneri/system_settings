[colors]
background = #282c34
background-alt = #363a42
foreground = #abb2bf
primary = #61afef
secondary = #98c379
alert = #e06c75
disabled = #5c6370
green = #98c379
red = #e06c75
yellow = #e5c07b
blue = #61afef
magenta = #c678dd
cyan = #56b6c2

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 40pt
radius = 0
dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=20;5
font-1 = JetBrainsMono Nerd Font:size=24;6
font-2 = JetBrainsMono Nerd Font:size=21;5

modules-left = i3 date
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

modules-right = eth-price filesystem memory cpu temperature bandwidth battery pulseaudio tray powermenu

wm-restack = i3

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-padding = 2

label-visible = %name%
label-visible-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M:%S
format-prefix = "󰃭 "
format-prefix-font = 2
label = %date%  󰥔 %time%

[module/eth-price]
type = custom/script
exec = ~/.config/i3/scripts/eth_price
interval = 60

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
format-mounted-prefix = "󰋊 "
format-mounted-prefix-font = 2
label-mounted = %used%/%total%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
warn-percentage = 90

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-font = 2
label = %used% (%percentage_used%%)
warn-percentage = 90

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠 "
format-prefix-font = 2
label = %percentage%%
warn-percentage = 80

[module/temperature]
type = internal/temperature
interval = 30
thermal-zone = 0
warn-temperature = 80
format-prefix = "󰔏 "
format-prefix-font = 2
label = %temperature-c%
format-warn-prefix = "󰔏 "
format-warn-prefix-font = 2
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

[module/bandwidth]
type = internal/network
interface = wlan0
interval = 3
label-connected = 󰁅 %downspeed% 󰁝 %upspeed%
label-disconnected = 󰤭 offline
label-disconnected-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC
poll-interval = 30

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%
label-low = %percentage%%

format-charging = <ramp-capacity> <label-charging>
format-charging-foreground = ${colors.green}

format-discharging = <ramp-capacity> <label-discharging>

format-full = <ramp-capacity> <label-full>
format-full-foreground = ${colors.green}

format-low = <ramp-capacity> <label-low>
format-low-foreground = ${colors.alert}

ramp-capacity-0 = 󰁺
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = 󰁼
ramp-capacity-1-foreground = ${colors.yellow}
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰁹
ramp-capacity-4-foreground = ${colors.green}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true

label-volume = %percentage%%
format-volume = <ramp-volume> <label-volume>

label-muted = 󰝟 muted
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾

click-right = pavucontrol

[module/tray]
type = internal/tray
tray-padding = 4px

[module/powermenu]
type = custom/text
label = 󰐥
label-font = 2
label-foreground = ${colors.alert}
click-left = ~/.config/i3/scripts/powermenu

[settings]
screenchange-reload = true
pseudo-transparency = true
