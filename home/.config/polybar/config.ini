[colors]
include-file = ~/.config/polybar/colors.ini

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 41pt
radius = 16
dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-left-size = 2%
border-right-size = 2%
border-top-size = 12
border-bottom-size = 12
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 0

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=21;5
font-1 = JetBrainsMono Nerd Font:size=25;6
font-2 = JetBrainsMono Nerd Font:size=21:weight=bold;5
font-3 = JetBrainsMono Nerd Font:size=18;4

modules-left = i3 cpu memory disk-root disk-home temperature pulseaudio xkeyboard power-profile battery
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

modules-center = eth-price
modules-right = gcal date tray powermenu

wm-restack = i3

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

label-focused = %name%
label-focused-font = 4
label-focused-background = #cc3a3a55
label-focused-padding = 14px

label-unfocused = %name%
label-unfocused-padding = 14px

label-visible = %name%
label-visible-padding = 14px

label-urgent = %name%
label-urgent-background = #f45070
label-urgent-foreground = #ffffff
label-urgent-padding = 14px

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M:%S
format-prefix = "󰃭 "
format-prefix-font = 2
format-padding = 6px
label = %date%  󰥔 %time%
label-font = 3
click-left = ~/.config/i3/scripts/gcal-agenda
click-right = touch /tmp/polybar-gcal-force

[module/gcal]
type = custom/script
exec = ~/.config/i3/scripts/gcal-next
interval = 30
format-padding = 6px
click-left = ~/.config/i3/scripts/gcal-agenda
click-right = touch /tmp/polybar-gcal-force

[module/eth-price]
type = custom/script
exec = ~/.config/i3/scripts/eth_price
interval = 60
format-font = 3
format-padding = 6px
click-left = ~/.config/i3/scripts/eth_chart

[module/memory]
type = custom/script
exec = ~/.config/i3/scripts/memory-monitor
interval = 2
format-padding = 6px

[module/disk-root]
type = custom/script
exec = ~/.config/i3/scripts/disk-monitor / "/"
interval = 30
format-padding = 6px

[module/disk-home]
type = custom/script
exec = ~/.config/i3/scripts/disk-monitor /home "~"
interval = 30
format-padding = 6px

[module/xkeyboard]
type = internal/xkeyboard
format-padding = 6px
layout-icon-0 = us;US
layout-icon-1 = ru;RU

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠 "
format-prefix-font = 2
format-padding = 6px
label = %percentage:3%%
warn-percentage = 80

[module/temperature]
type = internal/temperature
interval = 30
thermal-zone = 0
warn-temperature = 80
format-prefix = "󰔏 "
format-prefix-font = 2
format-padding = 6px
label = %temperature-c%
format-warn-prefix = "󰔏 "
format-warn-prefix-font = 2
format-warn-padding = 6px
label-warn = %temperature-c%
label-warn-foreground = #f45070

[module/battery]
type = custom/script
exec = ~/.config/i3/scripts/battery-monitor
tail = true
format-padding = 6px

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true

label-volume = %percentage%%
format-volume = <ramp-volume> <label-volume>
format-volume-padding = 6px

label-muted = 󰝟 muted
format-muted-padding = 6px
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾

click-right = pavucontrol

[module/power-profile]
type = custom/script
exec = ~/.config/i3/scripts/power-profile-status
interval = 5
format-font = 2
format-padding = 6px
click-left = ~/.config/i3/scripts/power-profile-status cycle

[module/tray]
type = internal/tray
tray-foreground = ${colors.foreground}
tray-padding = 2px
format-padding = 6px

[module/powermenu]
type = custom/text
label = 󰐥
label-font = 2
label-foreground = ${colors.alert}
label-padding = 6px
click-left = ~/.config/i3/scripts/powermenu

[settings]
screenchange-reload = true
pseudo-transparency = true
