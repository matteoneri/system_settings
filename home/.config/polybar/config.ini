[colors]
background = #282c34
background-alt = #363a42
foreground = #FFB347
primary = #FFB347
alert = #FFE8C0
disabled = #a67520

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 41pt
radius = 16
dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-left-size = 2%
border-right-size = 2%
border-top-size = 4
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 0

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=21;5
font-1 = JetBrainsMono Nerd Font:size=25;6
font-2 = JetBrainsMono Nerd Font:size=21:weight=bold;5

modules-left = i3 date gcal
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

modules-center = eth-price
modules-right = cpu memory temperature pulseaudio battery power-profile tray powermenu

wm-restack = i3

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1

label-visible = %name%
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = #f45070
label-urgent-foreground = #ffffff
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M:%S
format-prefix = "¾░āŁ "
format-prefix-font = 2
label = %date%  ¾░źö %time%
label-font = 3
click-left = touch /tmp/polybar-gcal-force

[module/gcal]
type = custom/script
exec = ~/.config/i3/scripts/gcal-next
tail = true
format-padding = 1
click-left = touch /tmp/polybar-gcal-force

[module/eth-price]
type = custom/script
exec = ~/.config/i3/scripts/eth_price
interval = 60
format-font = 3
format-padding = 1
click-left = ~/.config/i3/scripts/eth_chart

[module/memory]
type = internal/memory
interval = 2
format-prefix = "¾░Źø "
format-prefix-font = 2
format-padding = 1
label = %used% (%percentage_used%%)
warn-percentage = 90

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "¾░╗Ā "
format-prefix-font = 2
format-padding = 1
label = %percentage:3%%
warn-percentage = 80

[module/temperature]
type = internal/temperature
interval = 30
thermal-zone = 0
warn-temperature = 80
format-prefix = "¾░öÅ "
format-prefix-font = 2
format-padding = 1
label = %temperature-c%
format-warn-prefix = "¾░öÅ "
format-warn-prefix-font = 2
format-warn-padding = 1
label-warn = %temperature-c%
label-warn-foreground = #f45070

[module/battery]
type = custom/script
exec = ~/.config/i3/scripts/battery-monitor
tail = true
format-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true

label-volume = %percentage%%
format-volume = <ramp-volume> <label-volume>
format-volume-padding = 1

label-muted = ¾░Ø¤ muted
label-muted-foreground = ${colors.disabled}
format-muted-padding = 1

ramp-volume-0 = ¾░Ģ┐
ramp-volume-1 = ¾░¢Ć
ramp-volume-2 = ¾░ĢŠ

click-right = pavucontrol

[module/power-profile]
type = custom/script
exec = ~/.config/i3/scripts/power-profile-status
interval = 5
format-font = 2
format-padding = 1
click-left = ~/.config/i3/scripts/power-profile-status cycle

[module/tray]
type = internal/tray
tray-padding = 2px
format-padding = 1

[module/powermenu]
type = custom/text
label = ¾░Éź
label-font = 2
label-foreground = ${colors.alert}
label-padding = 1
click-left = ~/.config/i3/scripts/powermenu

[settings]
screenchange-reload = true
pseudo-transparency = true
