[colors]
background = #282c34
background-alt = #363a42
foreground = #FFB347
primary = #FFB347
secondary = #FFB347
alert = #FFE8C0
disabled = #a67520
green = #FFB347
red = #FFB347
yellow = #FFB347
blue = #FFB347
magenta = #FFB347
cyan = #FFB347

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 40pt
radius = 0
dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt

padding-left = 0
padding-right = 0

module-margin = 0

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=20;5
font-1 = JetBrainsMono Nerd Font:size=24;6
font-2 = JetBrainsMono Nerd Font:size=21;5

modules-left = i3 date gcal
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

modules-center = eth-price
modules-right = bandwidth cpu memory temperature battery pulseaudio tray powermenu

wm-restack = i3

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1

label-visible = %name%
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M:%S
format-prefix = "󰃭 "
format-prefix-font = 2
label = %date%  󰥔 %time%
click-left = polybar-msg action "#gcal.hook.1"

[module/gcal]
type = custom/ipc
hook-0 = ~/.config/i3/scripts/gcal-next
hook-1 = ~/.config/i3/scripts/gcal-next --force
initial = 1
format-prefix = "󰃰 "
format-prefix-font = 2
format-padding = 1
click-left = polybar-msg action "#gcal.hook.1"

[module/eth-price]
type = custom/script
exec = ~/.config/i3/scripts/eth_price
interval = 60
format-padding = 1

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
format-mounted-prefix = "󰋊 "
format-mounted-prefix-font = 2
label-mounted = %used%/%total%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
warn-percentage = 90

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-font = 2
format-padding = 1
label = %used% (%percentage_used%%)
warn-percentage = 90

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠 "
format-prefix-font = 2
format-padding = 1
label = %percentage:3%%
warn-percentage = 80

[module/temperature]
type = internal/temperature
interval = 30
thermal-zone = 0
warn-temperature = 80
format-prefix = "󰔏 "
format-prefix-font = 2
format-padding = 1
label = %temperature-c%
format-warn-prefix = "󰔏 "
format-warn-prefix-font = 2
format-warn-padding = 1
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

[module/bandwidth]
type = internal/network
interface = wlan0
interval = 3
format-connected-padding = 1
label-connected = 󰁅 %downspeed% 󰁝 %upspeed%
format-disconnected-padding = 1
label-disconnected = 󰤭 offline
label-disconnected-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = AC
poll-interval = 30

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%
label-low = %percentage%%

format-charging = <ramp-capacity> <label-charging>
format-charging-foreground = ${colors.green}
format-charging-padding = 1

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-padding = 1

format-full = <ramp-capacity> <label-full>
format-full-foreground = ${colors.green}
format-full-padding = 1

format-low = <ramp-capacity> <label-low>
format-low-foreground = ${colors.alert}
format-low-padding = 1

ramp-capacity-0 = 󰁺
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = 󰁼
ramp-capacity-1-foreground = ${colors.yellow}
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰁹
ramp-capacity-4-foreground = ${colors.green}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true

label-volume = %percentage%%
format-volume = <ramp-volume> <label-volume>
format-volume-padding = 1

label-muted = 󰝟 muted
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾

click-right = pavucontrol

[module/tray]
type = internal/tray
tray-padding = 2px

[module/powermenu]
type = custom/text
label = 󰐥
label-font = 2
label-foreground = ${colors.alert}
label-padding = 1
click-left = ~/.config/i3/scripts/powermenu

[settings]
screenchange-reload = true
pseudo-transparency = true
